<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOPAMING | App Portal</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Pretendard:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/portal.css">
</head>

<body>
    <!-- Background Effects -->
    <div class="bg-blob"></div>
    <div class="bg-blob-2"></div>

    <div class="portal-container">
        <!-- Portal Header -->
        <header class="portal-header">
            <h1 class="portal-logo">DOPAMING</h1>
            <p class="portal-subtitle">What would you like to explore today?</p>
        </header>

        <!-- App Grid -->
        <main class="app-grid">

            <!-- App 1: FIRE Tribe -->
            <a href="fire.html" class="app-card">
                <div class="app-icon-wrapper icon-fire">
                    🔥
                </div>
                <div class="app-name">FIRE Tribe</div>
                <div class="app-desc">은퇴 시뮬레이터</div>
            </a>

            <!-- App Placeholder to show scalability -->
            <div class="app-card" style="opacity: 0.6; cursor: default;">
                <div class="app-icon-wrapper icon-plus" style="font-size: 24px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </div>
                <div class="app-name" style="color: var(--text-secondary)">Coming Soon</div>
            </div>

        </main>
    </div>

    <!-- Script overlay for simple interactive click ripples or loading logic -->
    <script>
        // Simple elegant click ripple logic for cards
        document.querySelectorAll('.app-card[href]').forEach(card => {
            card.addEventListener('click', function (e) {
                // Pre-navigation visual feedback
                this.style.transform = 'scale(0.92)';
                this.style.opacity = '0.5';

                // Navigation follows automatically from the <a> tag
            });
        });
    </script>
</body>

</html>
